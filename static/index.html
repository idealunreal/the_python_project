<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Minimal Blog</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); max-width: 720px; margin: 0 auto; padding: 2rem 1rem; line-height: 1.6; }
        header { text-align: center; margin-bottom: 2.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 1rem; }
        h1 { margin: 0; color: var(--primary); font-size: 2rem; }
        .subtitle { color: #64748b; margin-top: 0.5rem; }
        .post { background: #fff; padding: 1.5rem; margin-bottom: 1.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .post:hover { transform: translateY(-2px); }
        .post h2 { margin: 0 0 0.5rem; font-size: 1.4rem; }
        .date { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.8rem; }
        #loading { text-align: center; color: #64748b; padding: 2rem; }
    </style>
</head>
<body>
    <header>
        <h1>📝 My Minimal Blog</h1>
        <p class="subtitle">FastAPI + Vanilla JS | 极简部署</p>
    </header>
    <main id="blog-container">
        <p id="loading">正在加载文章...</p>
    </main>
    <!-- 因为 main.py 把 / 挂载到了 static 目录，所以这里直接写 /app.js -->
    <script src="/app.js"></script>
</body>
</html>
