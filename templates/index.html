<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FastAPI Item Creator</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      padding: 32px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 3vw, 2.8rem);
    }
    p.description {
      margin: 0 0 24px;
      color: #4b5563;
      line-height: 1.6;
    }
    .form-grid {
      display: grid;
      gap: 16px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
    }
    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }
    button {
      margin-top: 8px;
      width: fit-content;
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      color: white;
      background: #4338ca;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    button:hover {
      transform: translateY(-1px);
      background: #3730a3;
    }
    .response {
      margin-top: 24px;
      padding: 18px;
      border-radius: 16px;
      background: #eef2ff;
      color: #312e81;
      font-family: ui-monospace, SFMono-Regular, Consolas, Liberation Mono, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .footer {
      margin-top: 32px;
      color: #6b7280;
      font-size: 0.95rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div>
        <h1>FastAPI Item Creator</h1>
        <p class="description">Use this simple frontend to post a new item to the API and see the JSON response instantly.</p>
      </div>

      <form id="item-form" class="form-grid">
        <div>
          <label for="name">Item name</label>
          <input id="name" name="name" type="text" placeholder="Coffee mug" required />
        </div>
        <div>
          <label for="price">Price</label>
          <input id="price" name="price" type="number" step="0.01" placeholder="12.99" required />
        </div>
        <button type="submit">Create item</button>
      </form>

      <div id="response" class="response">Submit the form to see the API response here.</div>

      <div class="footer">Local FastAPI frontend — submit items to <code>/items</code>.</div>
    </section>
  </main>

  <script>
    const form = document.getElementById('item-form');
    const responseBox = document.getElementById('response');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const data = {
        name: form.name.value.trim(),
        price: parseFloat(form.price.value),
      };

      if (!data.name || Number.isNaN(data.price)) {
        responseBox.textContent = 'Please enter a valid name and price.';
        return;
      }

      responseBox.textContent = 'Sending request...';

      try {
        const res = await fetch('/items', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const result = await res.json();
        responseBox.textContent = JSON.stringify(result, null, 2);
      } catch (error) {
        responseBox.textContent = 'Failed to send request. Check the console for details.';
        console.error(error);
      }
    });
  </script>
</body>
</html>
